name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LLVM_VERSION: 21

jobs:
  check:
    name: Static Analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for clang-tidy-diff to find merge-base

      - uses: ./.github/actions/setup
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/debug/_deps
          key: deps-debug-${{ hashFiles('cmake/Dependencies.cmake') }}

      - name: Configure ccache
        run: |
          ccache --set-config=cache_dir=$HOME/.ccache
          ccache --set-config=max_size=500M
          ccache --set-config=compression=true
          ccache -z  # Zero stats

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-check-${{ runner.os }}-llvm${{ env.LLVM_VERSION }}
          restore-keys: |
            ccache-check-${{ runner.os }}-

      - name: Check formatting
        run: make format-check

      - name: Run clang-tidy (full, on push to main)
        if: github.event_name == 'push'
        run: make clang-tidy

      - name: Configure builds (for clang-tidy-diff)
        if: github.event_name == 'pull_request'
        run: |
          cmake --preset=debug
          cmake --preset=release
          CC=clang CXX=clang++ cmake --preset=fuzz
          cmake --build build/debug --target xkcp_build
          cmake --build build/release --target xkcp_build
          cmake --build build/fuzz --target xkcp_build

      - name: Run clang-tidy (changed lines only, on PR)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }}
          FAILED=0
          # Check main sources against debug build
          if git diff -U0 origin/${{ github.base_ref }}...HEAD -- 'src/**/*.cpp' 'src/**/*.h' 'include/**/*.h' 'tests/**/*.cpp' | grep -q .; then
            git diff -U0 origin/${{ github.base_ref }}...HEAD -- 'src/**/*.cpp' 'src/**/*.h' 'include/**/*.h' 'tests/**/*.cpp' | \
              clang-tidy-diff -p1 -path build/debug -use-color -warnings-as-errors='*' || FAILED=1
          fi
          # Check benchmarks against release build
          if git diff -U0 origin/${{ github.base_ref }}...HEAD -- 'benchmarks/**/*.cpp' | grep -q .; then
            git diff -U0 origin/${{ github.base_ref }}...HEAD -- 'benchmarks/**/*.cpp' | \
              clang-tidy-diff -p1 -path build/release -use-color -warnings-as-errors='*' || FAILED=1
          fi
          # Check fuzzers against fuzz build
          if git diff -U0 origin/${{ github.base_ref }}...HEAD -- 'fuzz/**/*.cpp' | grep -q .; then
            git diff -U0 origin/${{ github.base_ref }}...HEAD -- 'fuzz/**/*.cpp' | \
              clang-tidy-diff -p1 -path build/fuzz -use-color -warnings-as-errors='*' || FAILED=1
          fi
          exit $FAILED

  test:
    name: Test (${{ matrix.preset }})
    needs: check
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        preset: [debug, tsan, release]
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.preset }}/_deps
          key: deps-${{ matrix.preset }}-${{ hashFiles('cmake/Dependencies.cmake') }}

      - name: Configure ccache
        run: |
          ccache --set-config=cache_dir=$HOME/.ccache
          ccache --set-config=max_size=500M
          ccache --set-config=compression=true
          ccache -z

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ matrix.preset }}-${{ runner.os }}-llvm${{ env.LLVM_VERSION }}
          restore-keys: |
            ccache-${{ matrix.preset }}-${{ runner.os }}-

      - name: Configure
        run: cmake --preset=${{ matrix.preset }}

      - name: Build
        run: cmake --build build/${{ matrix.preset }}

      - name: Test
        run: ctest --preset=${{ matrix.preset }}

  bench:
    name: Benchmark
    needs: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/release/_deps
          key: deps-release-${{ hashFiles('cmake/Dependencies.cmake') }}

      - name: Configure ccache
        run: |
          ccache --set-config=cache_dir=$HOME/.ccache
          ccache --set-config=max_size=500M
          ccache --set-config=compression=true
          ccache -z

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-bench-${{ runner.os }}-llvm${{ env.LLVM_VERSION }}
          restore-keys: |
            ccache-bench-${{ runner.os }}-

      - name: Build and run benchmarks
        run: make bench

  fuzz:
    name: Fuzz (1 min)
    needs: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/fuzz/_deps
          key: deps-fuzz-${{ hashFiles('cmake/Dependencies.cmake') }}

      - name: Configure ccache
        run: |
          ccache --set-config=cache_dir=$HOME/.ccache
          ccache --set-config=max_size=500M
          ccache --set-config=compression=true
          ccache -z

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-fuzz-${{ runner.os }}-llvm${{ env.LLVM_VERSION }}
          restore-keys: |
            ccache-fuzz-${{ runner.os }}-

      - name: Build fuzzers
        run: make fuzz

      - name: Create corpus directory
        run: mkdir -p corpus/evm

      - name: Run EVM fuzzer
        run: ./build/fuzz/fuzz/evm_fuzzer corpus/evm/ -max_total_time=60